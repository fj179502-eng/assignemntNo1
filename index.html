<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description"
        content="A modern portfolio featuring high-end web development and AI project demonstrations. Explore our latest work and services.">
    <title>Innovation Hub | Modern Portfolio Slider</title>
    <link rel="stylesheet" href="style.css">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
        rel="stylesheet">

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>

<body>

    <header class="hero" aria-label="Featured Projects Slider">
        <div class="slider" id="main-slider">

            <div class="slides" id="slides-container" role="region" aria-live="polite">
            </div>
            <button class="nav-btn prev" aria-label="Previous Slide">
                <i class="fas fa-chevron-left"></i>
            </button>
            <button class="nav-btn next" aria-label="Next Slide">
                <i class="fas fa-chevron-right"></i>
            </button>


            <div class="dots" id="dots-container" role="tablist"></div>

        </div>
    </header>
    <script src="script.js"></script>
</body>

</html>
